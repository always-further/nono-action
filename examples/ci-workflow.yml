name: CI with nono sandbox

on:
  pull_request:
    branches: [main]
  # Safe for fork PRs — secrets are stripped from env and injected via proxy
  pull_request_target:
    branches: [main]

jobs:
  # ----------------------------------------------------------------
  # Build & test — fully sandboxed, no actions/checkout needed
  # ----------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      # Sandboxed checkout replaces actions/checkout@v4.
      # The GITHUB_TOKEN is injected via nono's credential proxy —
      # never persisted in .git/config. The clone runs inside a
      # Landlock sandbox so malicious git hooks can't escape.
      #
      # For pull_request_target: explicitly checkout the PR head SHA
      # (default would checkout the base branch, not the fork's code).

      # ----------------------------------------------------------------
      # Install dependencies — network limited to package registry only
      # ----------------------------------------------------------------
      - name: Install dependencies
        uses: always-further/nono-action@v1
        with:
          checkout: true
          checkout-ref: ${{ github.event.pull_request.head.sha || github.sha }}
          run: npm ci
          fs-read: "."
          fs-write: "./node_modules"
          network: "registry.npmjs.org"

      # ----------------------------------------------------------------
      # Run tests — no network at all, write only to coverage dir
      # ----------------------------------------------------------------
      - name: Run tests
        uses: always-further/nono-action@v1
        with:
          run: npm test
          fs-read: "./src, ./tests, ./node_modules"
          fs-write: "./coverage"
          network: blocked

      # ----------------------------------------------------------------
      # Build — no network, write only to dist
      # ----------------------------------------------------------------
      - name: Build
        uses: always-further/nono-action@v1
        with:
          run: npm run build
          fs-read: "./src, ./node_modules"
          fs-write: "./dist"
          network: blocked

  # ----------------------------------------------------------------
  # Deploy — credential injected via proxy, never in env
  # ----------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout and deploy
        uses: always-further/nono-action@v1
        with:
          checkout: true
          run: ./scripts/deploy.sh
          fs-read: "./dist, ./fly.toml"
          fs-write: ""
          network: "api.fly.io"
          credentials: |
            DEPLOY_TOKEN:api.fly.io:header
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

  # ----------------------------------------------------------------
  # Audit — wrap an untrusted third-party tool with max restrictions
  # ----------------------------------------------------------------
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Run third-party audit tool
        uses: always-further/nono-action@v1
        with:
          checkout: true
          run: npx some-audit-tool --report
          fs-read: "./src, ./package.json, ./node_modules"
          fs-write: "./audit-report"
          network: blocked
